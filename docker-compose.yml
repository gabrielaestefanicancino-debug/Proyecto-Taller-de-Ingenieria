version: '3.8'

services:
  # Servicio de la Base de Datos (MySQL)
  db:
    image: mysql:8.0
    container_name: mysql_bilioteca
    restart: always
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - red-biblioteca

  # Servicio de la Aplicación Web (PHP)
  web:
    build: ./app
    container_name: web_php_biblioteca
    restart: always
    ports:
      - "8085:80"
    env_file:
      - .env
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
    networks:
      - red-biblioteca

volumes:
  db_data:

networks:
  red-biblioteca:
    driver: bridge
